name: Auto News Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch News
        run: curl -o news.json https://criclive24-99787-default-rtdb.firebaseio.com/news.json

      - name: Generate Pages SAFE FINAL
        run: |
          mkdir -p news

          cat news.json | jq -c 'to_entries[]' | while read row; do

            title=$(echo "$row" | jq -r '.value.title')
            content=$(echo "$row" | jq -r '.value.content')

            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            echo "<h1>$title</h1><p>$content</p>" > news/$slug.html

          done

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"

          git add .
          git commit -m "fix pages" || echo "no change"
          git push
