name: Auto Sitemap Generator

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Fetch News Data
        run: curl -L -o news.json https://criclive24-99787-default-rtdb.firebaseio.com/news.json

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          echo '<url><loc>https://ksuvon940-cloud.github.io/Criclive24/</loc></url>' >> sitemap.xml

          jq -c 'to_entries[]' news.json | while read row; do
            title=$(echo $row | jq -r '.value.title')
            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            echo "<url><loc>https://ksuvon940-cloud.github.io/Criclive24/news.html?slug=$slug</loc></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sitemap.xml
          git commit -m "Auto sitemap update" || echo "No changes"
          git push
