name: CricLive24 Auto Sitemap

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq

      - name: Fetch News Data
        run: |
          curl -o news.json https://criclive24-99787-default-rtdb.firebaseio.com/news.json

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          echo '<url>
          <loc>https://ksuvon940-cloud.github.io/Criclive24/</loc>
          <changefreq>hourly</changefreq>
          <priority>1.0</priority>
          </url>' >> sitemap.xml

          echo '<url>
          <loc>https://ksuvon940-cloud.github.io/Criclive24/match.html</loc>
          <changefreq>daily</changefreq>
          <priority>0.8</priority>
          </url>' >> sitemap.xml

          echo '<url>
          <loc>https://ksuvon940-cloud.github.io/Criclive24/news.html</loc>
          <changefreq>daily</changefreq>
          <priority>0.8</priority>
          </url>' >> sitemap.xml

          for row in $(cat news.json | jq -c '.[]'); do
            title=$(echo $row | jq -r '.title')

            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

            echo "<url>
            <loc>https://ksuvon940-cloud.github.io/Criclive24/news.html?slug=$slug</loc>
            <changefreq>weekly</changefreq>
            <priority>0.7</priority>
            </url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Generate news-sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > news-sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"
          xmlns:news="http://www.google.com/schemas/sitemap-news/0.9">' >> news-sitemap.xml

          for row in $(cat news.json | jq -c '.[]'); do

            title=$(echo $row | jq -r '.title')
            time=$(echo $row | jq -r '.time')

            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

            echo "<url>
              <loc>https://ksuvon940-cloud.github.io/Criclive24/news.html?slug=$slug</loc>

              <news:news>
                <news:publication>
                  <news:name>CricLive24</news:name>
                  <news:language>en</news:language>
                </news:publication>

                <news:publication_date>$time</news:publication_date>

                <news:title>$title</news:title>

              </news:news>

            </url>" >> news-sitemap.xml
          done

          echo '</urlset>' >> news-sitemap.xml

      - name: Commit Sitemap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sitemap.xml news-sitemap.xml

          git commit -m "Auto sitemap update" || echo "No changes"

          git push
