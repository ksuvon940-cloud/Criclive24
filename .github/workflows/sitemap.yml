name: Auto Sitemap Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch News Data
        run: curl -o news.json https://criclive24-99787-default-rtdb.firebaseio.com/news.json

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          echo '<url><loc>https://ksuvon940-cloud.github.io/Criclive24/</loc></url>' >> sitemap.xml

          grep -o '"title":"[^"]*"' news.json | sed 's/"title":"//g' | sed 's/"//g' | while read title; do
            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
            echo "<url><loc>https://ksuvon940-cloud.github.io/Criclive24/news.html?slug=$slug</loc></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Generate news-sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > news-sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"
          xmlns:news="http://www.google.com/schemas/sitemap-news/0.9">' >> news-sitemap.xml

          paste <(grep -o '"title":"[^"]*"' news.json | sed 's/"title":"//g' | sed 's/"//g') \
                <(grep -o '"time":"[^"]*"' news.json | sed 's/"time":"//g' | sed 's/"//g') | while read title time; do

            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            echo "<url>" >> news-sitemap.xml
            echo "<loc>https://ksuvon940-cloud.github.io/Criclive24/news.html?slug=$slug</loc>" >> news-sitemap.xml
            echo "<news:news>" >> news-sitemap.xml
            echo "<news:publication>" >> news-sitemap.xml
            echo "<news:name>CricLive24</news:name>" >> news-sitemap.xml
            echo "<news:language>en</news:language>" >> news-sitemap.xml
            echo "</news:publication>" >> news-sitemap.xml
            echo "<news:publication_date>$time</news:publication_date>" >> news-sitemap.xml
            echo "<news:title>$title</news:title>" >> news-sitemap.xml
            echo "</news:news>" >> news-sitemap.xml
            echo "</url>" >> news-sitemap.xml
          done

          echo '</urlset>' >> news-sitemap.xml

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Auto sitemap update" || echo "No changes"
          git push
