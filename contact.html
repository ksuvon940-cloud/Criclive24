<!DOCTYPE html>
<html>
<head>
  <title>Contact - CricLive24</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: black;
      color: #fff;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, #00f2fe22, transparent 40%),
                  radial-gradient(circle, #4facfe22, transparent 40%);
      animation: moveBg 10s linear infinite;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      50% { transform: translate(-20%, -20%); }
      100% { transform: translate(0,0); }
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      animation: fadeIn 1s ease;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-size: 34px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      text-align: center;
      color: #ccc;
      margin-bottom: 25px;
    }

    .email {
      text-align: center;
      font-size: 18px;
      color: #00f2fe;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00f2fe;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
    }

    .footer a {
      color: #aaa;
      text-decoration: none;
      margin: 0 15px;
      transition: 0.3s;
    }

    .footer a:hover {
      color: #00f2fe;
      text-shadow: 0 0 10px #00f2fe;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Contact Us</h1>

    <p>If you have any questions or suggestions, feel free to contact us.</p>

    <div class="email">📧 ksuvon940@gmail.com</div>

    <div class="footer">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </div>

</body>
</html>
