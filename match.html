<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Match - CricLive24</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#000000,#0a0a0a);
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:rgba(20,0,0,0.85);
padding:20px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,0,0.25);
border:1px solid rgba(255,0,0,0.2);
backdrop-filter: blur(10px);
}

/* 🔥 ADD THIS HERE 👇 */
h2{
color:#ff2a2a;
letter-spacing:1px;
text-shadow:0 0 12px rgba(255,0,0,0.7);
}

/* teams */

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.team img{
width:60px;
height:60px;
border-radius:50%;
box-shadow:0 0 12px rgba(255,0,0,0.7);
}




/* PLAYER */
#playerBox{
position:relative;
width:100%;
aspect-ratio:16/9;
border-radius:14px;
margin-top:20px;
background:#000;
overflow:hidden;
box-shadow:0 0 30px rgba(255,0,0,0.4);
border:1px solid rgba(255,0,0,0.3);
}


#playerBox iframe,
#playerBox video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
object-fit:cover;
}


/* servers */

.servers{
margin-top:10px;
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}


.servers button{
padding:10px 16px;
border:none;
background:linear-gradient(45deg,#ff0000,#ff3b3b);
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 12px rgba(255,0,0,0.5);
}

.servers button:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,0,0,0.8);
}



/* viewer */

.viewer{
margin-top:8px;
font-size:14px;
}

/* chat */

.chatBox{
margin-top:20px;
background:rgba(10,0,0,0.9);
padding:15px;
border-radius:14px;
border:1px solid rgba(255,0,0,0.25);
box-shadow:0 0 18px rgba(255,0,0,0.25);
}
/* 🔥 ADD THIS EXACTLY HERE 👇 */
#messages div{
padding:6px 8px;
margin-bottom:4px;
border-radius:6px;
background:rgba(255,0,0,0.08);
box-shadow:0 0 6px rgba(255,0,0,0.2);
}

#messages div:last-child{
border-bottom:none;
}


#messages{
height:150px;
overflow:auto;
text-align:left;
font-size:14px;
}

.chatInput{
display:flex;
margin-top:10px;
}
.chatInput{
display:flex;
margin-top:10px;
gap:8px;
}

.chatInput input{
flex:1;
padding:12px;
border:none;
background:#0a0a0a;
color:white;
border-radius:8px;
outline:none;
box-shadow:inset 0 0 8px rgba(255,0,0,0.2);
}

.chatInput input:focus{
box-shadow:0 0 10px rgba(255,0,0,0.5);
}

.chatInput button{
padding:12px 18px;
border:none;
background:linear-gradient(45deg,#ff0000,#ff3b3b);
color:white;
cursor:pointer;
border-radius:8px;
font-weight:bold;
box-shadow:0 0 10px rgba(255,0,0,0.5);
transition:0.3s;
}

.chatInput button:hover{
transform:scale(1.05);
box-shadow:0 0 18px rgba(255,0,0,0.8);
}

@media (max-width:600px){

body{
padding:10px;
}

.container{
padding:15px;
border-radius:15px;
}

h2{
font-size:20px;
}

.teams img{
width:45px;
height:45px;
}

.servers{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.servers button{
padding:12px;
font-size:14px;
}

#messages{
height:120px;
font-size:13px;
}

}


</style>

</head>
<body>

<div class="container">

<h2 id="title">Loading...</h2>

<div class="teams">

<div class="team">
<img id="t1logo">
<div id="t1"></div>
</div>

<div>VS</div>

<div class="team">
<img id="t2logo">
<div id="t2"></div>
</div>
</div>

<div id="score"></div>
<div id="status"></div>
<div id="time"></div>

<!-- PLAYER -->

<div id="playerBox"></div>

<div class="servers">

<button onclick="playStream(0)">HD 1</button>
<button onclick="playStream(1)">HD 2</button>
<button onclick="playYT()">YouTube</button>
<button onclick="playFB()">Facebook</button>

</div>

<div class="viewer">
👁 <span id="viewerCount">0</span> watching
</div>

<!-- CHAT -->

<div class="chatBox">

<div id="messages"></div>

<div class="chatInput">
<input id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</div>

<script>

/* MATCH DATA */


/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDFJd644ION6LvfWowXUIhXuaqKYRCvtKU",
  authDomain: "criclive24-99787.firebaseapp.com",
  databaseURL: "https://criclive24-99787-default-rtdb.firebaseio.com/",
  projectId: "criclive24-99787",
  storageBucket: "criclive24-99787.appspot.com"
};

firebase.initializeApp(firebaseConfig);



let data = JSON.parse(localStorage.getItem("matchData"));

if(data){

document.getElementById("title").innerText =
data.team1+" vs "+data.team2;

document.getElementById("t1").innerText=data.team1;
document.getElementById("t2").innerText=data.team2;

document.getElementById("t1logo").src=data.t1logo;
document.getElementById("t2logo").src=data.t2logo;

document.getElementById("score").innerText=
(data.innings1?.score||"")+" "+
(data.innings2?.score||"");

document.getElementById("status").innerText=
"Status: "+data.status;

document.getElementById("time").innerText=
data.date+" "+data.time;

}

/* STREAM LOAD FROM FIREBASE */

let streams=[];
let ytLive="";
let fbLive="";

firebase.database().ref("streams").on("value",snap=>{

let s = snap.val();

if(!s) return;

streams=[
s.hd1 || "",
s.hd2 || ""
];

ytLive = s.youtube || "";
fbLive = s.facebook || "";

});


/* PLAY M3U8 */
function playStream(i){

let link = streams[i];

if(!link){
document.getElementById("playerBox").innerHTML="<h3>No Stream</h3>";
return;
}

/* M3U8 stream */

if(link.includes(".m3u8")){

document.getElementById("playerBox").innerHTML=
'<video id="video" controls autoplay playsinline></video>';

let video=document.getElementById("video");

if(Hls.isSupported()){
let hls=new Hls();
hls.loadSource(link);
hls.attachMedia(video);
}else{
video.src=link;
}

}

/* iframe stream */

else{

document.getElementById("playerBox").innerHTML=
'<iframe src="'+link+'" allowfullscreen allow="autoplay; fullscreen"></iframe>';

}

}

/* YOUTUBE */

function playYT(){

document.getElementById("playerBox").innerHTML=
'<iframe src="'+ytLive+'?autoplay=1" allowfullscreen></iframe>';

}

/* FACEBOOK */

function playFB(){

document.getElementById("playerBox").innerHTML=
'<iframe src="'+fbLive+'" allowfullscreen></iframe>';

}

/* AUTO FALLBACK */

function autoStream(){

// first try HD1
if(streams[0]){
playStream(0);
}

// 5 sec check
setTimeout(()=>{

let v=document.getElementById("video");

if(!v || v.readyState===0){

// try HD2
if(streams[1]){
playStream(1);
}else{

// fallback youtube

if(ytLive){
playYT();
}else{
document.getElementById("playerBox").innerHTML=
"<h3>Stream not available</h3>";
}
}

}

},5000);

}
window.onload=()=>{

setTimeout(()=>{

if(streams.length>0){
autoStream();
}

},2000);

};

let viewersRef=firebase.database().ref("viewers");

let user = "u"+Math.random().toString(36).substr(2,9);

firebase.database().ref("viewers/"+user).set(true);

firebase.database().ref("viewers").on("value",snap=>{
document.getElementById("viewerCount").innerText=snap.numChildren();
});

window.addEventListener("beforeunload",()=>{
firebase.database().ref("viewers/"+user).remove();
});

viewersRef.on("value",snap=>{
document.getElementById("viewerCount").innerText=snap.val();
});

window.addEventListener("beforeunload",()=>{
viewersRef.transaction(v=>(v||1)-1);
});

/* CHAT */

let chatRef=firebase.database().ref("chat");
chatRef.on("child_added",snap=>{

let d = snap.val();

let box = document.getElementById("messages");

/* message add */

box.innerHTML += "<div>"+d+"</div>";

/* auto scroll bottom */

box.scrollTop = box.scrollHeight;

});

function sendMsg(){

let msg=document.getElementById("msgInput").value.trim();

/* empty message block */

if(msg.length < 1){
return;
}

/* message limit */

if(msg.length > 120){
msg = msg.substring(0,120);
}

/* send message */

chatRef.push(msg);

/* clear input */

document.getElementById("msgInput").value="";

}
// 🔥 ENTER PRESS = SEND MESSAGE
document.getElementById("msgInput")
.addEventListener("keypress",function(e){
  if(e.key === "Enter"){
    sendMsg();
  }
});

</script>

</body>
</html>
