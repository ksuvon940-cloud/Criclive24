<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ DYNAMIC TITLE -->
<title id="pageTitle">Cricket News - CricLive24</title>

<!-- ✅ SEO META -->
<meta id="metaDesc" name="description" content="Latest cricket news, IPL updates, match reports and breaking news from CricLive24.">
<meta name="robots" content="index, follow, max-image-preview:large">

<link id="canonicalLink" rel="canonical" href="">

<!-- ✅ OPEN GRAPH -->
<meta property="og:title" id="ogTitle" content="">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:image" id="ogImage" content="">
<meta property="og:type" content="article">
<meta property="og:url" id="ogUrl" content="">
<meta property="article:publisher" content="CricLive24">

<!-- ✅ TWITTER -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="twTitle" content="">
<meta name="twitter:description" id="twDesc" content="">
<meta name="twitter:image" id="twImage" content="">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f7fa;
}
.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}
h1{font-size:26px;}
img{width:100%;border-radius:10px;margin:15px 0;}
p{line-height:1.7;font-size:17px;}
</style>
</head>
<body>

<div class="container">

  <h1 id="title"></h1>
  <small id="time"></small>

  <img id="image" src="">

  <!-- 🔥 content এখন div (better SEO) -->
  <div id="content" itemprop="articleBody"></div>

  <!-- 🔥 internal linking -->
  <h3>More Cricket News</h3>
  <div id="relatedNews"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDFJd644ION6LvfWowXUIhXuaqKYRCvtKU",
  authDomain: "criclive24-99787.firebaseapp.com",
  databaseURL: "https://criclive24-99787-default-rtdb.firebaseio.com/"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function loadRelatedNews(currentSlug){
  db.ref("news").once("value", snapshot=>{
    let html = "";
    let count = 0;

    snapshot.forEach(child=>{
      let n = child.val();
      let s = createSlug(n.title);

      if(s !== currentSlug && count < 5){
        html += `
        <p>
          <a href="news.html?slug=${s}">
            🔗 ${n.title}
          </a>
        </p>`;
        count++;
      }
    });

    document.getElementById("relatedNews").innerHTML = html;
  });
}



function getSlug(){
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get("slug");
}

function createSlug(title){
  return title.toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}

let slug = getSlug();

if(!slug){
  document.getElementById("title").innerText = "News not found";
}


// 🔥 LOAD NEWS
db.ref("news").once("value", snapshot=>{
  let data = snapshot.val() || {};

  Object.values(data).forEach(n=>{
    let s = createSlug(n.title);

    if(s === slug){

      // ✅ SHOW CONTENT
      document.getElementById("title").innerText = n.title;
      document.getElementById("time").innerText = n.time;
     if(n.image){
  document.getElementById("image").src = n.image;
  document.getElementById("image").alt = n.title;
}else{
  document.getElementById("image").style.display = "none";
}
     let formattedContent = n.content
  .split("\\n")
  .map(p => "<p>" + p + "</p>")
  .join("");

// 🔥 auto H2 add (SEO boost)
formattedContent = formattedContent.replaceAll(
"</p>",
"</p><h2>Latest Cricket Update</h2>"
);

document.getElementById("content").innerHTML = formattedContent;

loadRelatedNews(slug);
      // ✅ SEO UPDATE
      document.title = n.title + " | CricLive24";

      document.getElementById("metaDesc").content = n.title + " - Full match details, analysis, highlights and latest cricket updates on CricLive24.";
      document.getElementById("canonicalLink").href = window.location.href;

      document.getElementById("ogTitle").content = n.title;
      document.getElementById("ogDesc").content = n.title;
      document.getElementById("ogImage").content = n.image || "https://ksuvon940-cloud.github.io/Criclive24/logo.png";

      document.getElementById("twTitle").content = n.title;
      document.getElementById("twDesc").content = n.title;
      document.getElementById("twImage").content = n.image || "https://ksuvon940-cloud.github.io/Criclive24/logo.png";

document.getElementById("ogUrl").content = window.location.href;

      // ✅ STRUCTURED DATA
     
const schema = {
  "@context": "https://schema.org",
  "@type": "NewsArticle",

  "headline": n.title,

  "image": [
    n.image || "https://ksuvon940-cloud.github.io/Criclive24/logo.png"
  ],

  "datePublished": new Date().toISOString(),
  "dateModified": new Date().toISOString(),

  "mainEntityOfPage": window.location.href,

  "author": {
    "@type": "Organization",
    "name": "CricLive24"
  },

  "publisher": {
    "@type": "Organization",
    "name": "CricLive24",
    "logo": {
      "@type": "ImageObject",
      "url": "https://ksuvon940-cloud.github.io/Criclive24/logo.png"
    }
  }
};



      let script = document.createElement("script");
      script.type = "application/ld+json";
      script.innerHTML = JSON.stringify(schema);
      document.head.appendChild(script);

    }
  });

if(!document.getElementById("title").innerText){
  document.getElementById("title").innerText = "News not found";
}

});
</script>

</body>
</html>
