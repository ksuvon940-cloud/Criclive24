<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ DYNAMIC SEO -->
<title id="pageTitle">Loading News...</title>
<meta name="description" id="metaDesc" content="Latest cricket news">
<link rel="canonical" id="canonicalLink" href="">

<!-- ✅ OPEN GRAPH -->
<meta property="og:title" id="ogTitle">
<meta property="og:description" id="ogDesc">
<meta property="og:image" id="ogImage">
<meta property="og:type" content="article">

<!-- ✅ STRUCTURED DATA -->
<script type="application/ld+json" id="newsSchema"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}

.container{
  max-width:800px;
  margin:auto;
  padding:15px;
}

h1{
  font-size:22px;
}

img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.time{
  color:gray;
  font-size:13px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <div class="time" id="time"></div>
  <img id="image" style="display:none;">
  <p id="content"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDFJd644ION6LvfWowXUIhXuaqKYRCvtKU",
  authDomain: "criclive24-99787.firebaseapp.com",
  databaseURL: "https://criclive24-99787-default-rtdb.firebaseio.com/",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 GET SLUG
const params = new URLSearchParams(window.location.search);
const slugParam = params.get("slug");

// 🔥 SAME SLUG FUNCTION
function createSlug(title){
  return title.toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}

// 🔥 LOAD NEWS
db.ref("news").once("value", snapshot=>{
  let data = snapshot.val();

  Object.values(data).forEach(n=>{
    let slug = createSlug(n.title);

    if(slug === slugParam){

      // ✅ CONTENT LOAD
      document.getElementById("title").innerText = n.title;
      document.getElementById("time").innerText = n.time;
      document.getElementById("content").innerHTML = n.content || "";

      if(n.image){
        let img = document.getElementById("image");
        img.src = n.image;
        img.style.display = "block";
      }

      // ✅ SEO UPDATE
      document.title = n.title + " | CricLive24";
      document.getElementById("metaDesc").content = n.content ? n.content.substring(0,150) : n.title;

      document.getElementById("ogTitle").content = n.title;
      document.getElementById("ogDesc").content = n.title;
      document.getElementById("ogImage").content = n.image || "";

      document.getElementById("canonicalLink").href = window.location.href;

      // ✅ NEWS SCHEMA (🔥 BIG SEO)
    const schema = {
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": n.title,
  "image": n.image ? [n.image] : [],
  "datePublished": new Date(n.time).toISOString(),
  "dateModified": new Date(n.time).toISOString(),
  "mainEntityOfPage": window.location.href,
  "description": n.content ? n.content.substring(0,150) : n.title,
  "author": {
    "@type": "Organization",
    "name": "CricLive24"
  },
  "publisher": {
    "@type": "Organization",
    "name": "CricLive24",
    "logo": {
      "@type": "ImageObject",
      "url": "https://ksuvon940-cloud.github.io/Criclive24/logo.png"
    }
  }
};

      document.getElementById("newsSchema").textContent = JSON.stringify(schema);

    }
  });
});
</script>

</body>
</html>
