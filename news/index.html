<script>
fetch("/Criclive24/news.json")
  .then(res => res.json())
  .then(data => {

    let html = "";

    for (let key in data) {
      let n = data[key];

      html += '<li><a href="/Criclive24/news/' + key + '.html">' + n.title + '</a></li>';
    }

    document.getElementById("newsList").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("newsList").innerHTML = "Error loading news";
  });
</script>
