<script>
fetch("/Criclive24/news.json")
  .then(res => res.json())
  .then(data => {

    let html = "";

    Object.keys(data).forEach(key => {
      let n = data[key];

      html += `<li>
        <a href="/Criclive24/news/${key}.html">${n.title}</a>
      </li>`;
    });

    document.getElementById("newsList").innerHTML = html;

  })
  .catch(err => {
    document.getElementById("newsList").innerHTML = "❌ Failed";
    console.error(err);
  });
</script>
